<!DOCTYPE html>
<html lang="es">

<head>

    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-N9LMPQBM');</script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="description" content="Registrate en Game Store">
    <meta name="theme-color" content="#58009A">
    <title>Registro - Game Store</title>
    <link rel="icon" type="image/x-icon" href="/static/img/Icon.png">
    <link rel="stylesheet" href="/static/css/style.css?v=3.0">
    <link rel="stylesheet" href="/static/css/stylee.css?v=3.18">
    <link rel="stylesheet" href="/static/css/responsive.css?v=2.3">
    <link rel="stylesheet" href="/static/css/mobile-aesthetic.css?v=2.3">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body {
            background: radial-gradient(ellipse at 60% 20%, #2d0060 0%, #0f0d12 55%, #0a0a14 100%);
            min-height: 100vh;
        }
        .main-content {
            padding: 16px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 780px;
            width: 100%;
            background: rgba(30, 24, 42, 0.93);
            border: 1px solid rgba(139, 92, 246, 0.28);
            border-radius: 20px;
            padding: 28px 36px 24px;
            box-shadow: 0 0 0 1px rgba(139,92,246,0.08), 0 8px 40px rgba(0,0,0,0.55), 0 0 80px rgba(88,0,154,0.18);
            backdrop-filter: blur(12px);
        }
        /* Header compacto */
        .login-brand {
            display: flex; align-items: center; justify-content: center;
            gap: 10px; margin-bottom: 10px;
        }
        .login-brand img { width: 32px; height: 32px; object-fit: contain; }
        .login-brand-name { font-size: 18px; font-weight: 800; color: #e9d5ff; letter-spacing: 1px; text-transform: uppercase; }
        .container h1 { font-size: 22px; margin-bottom: 2px; letter-spacing: -0.5px; text-align: center; }
        .description { font-size: 13px; margin-bottom: 16px; color: #9ca3af; text-align: center; }

        /* Grid 2 columnas para los campos principales */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px 20px;
            margin-bottom: 12px;
        }
        .form-grid .form-col {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        /* Verificación ocupa ambas columnas */
        .form-grid .form-col.full-width {
            grid-column: 1 / -1;
        }

        .form-line {
            flex-direction: column; align-items: flex-start;
            padding: 0; border-bottom: none; gap: 5px; margin-bottom: 0;
        }
        .label { width: 100%; font-size: 12px; color: #c4b5fd; font-weight: 600; letter-spacing: 0.3px; }
        .input-field {
            border-radius: 9px;
            border: 1px solid rgba(139,92,246,0.3);
            background: rgba(255,255,255,0.05);
            font-size: 14px; padding: 10px 12px;
        }
        .input-field:focus {
            border-color: #8b5cf6;
            background: rgba(139,92,246,0.08);
            box-shadow: 0 0 0 3px rgba(139,92,246,0.18);
        }

        /* Captcha compacto */
        .verification-line { margin-bottom: 0; }
        .captcha-label-text { font-size: 13px; }
        .registro-alert[style*="display:block"] { margin: 8px 0 4px; font-size: 13px; padding: 10px 14px; }

        /* Botones en fila */
        .register-section { margin-top: 14px; }
        .buttons-container {
            flex-direction: row;
            gap: 10px;
        }
        .register-btn {
            flex: 1;
            padding: 12px 20px;
            font-size: 14px;
            border-radius: 11px;
            letter-spacing: 0.6px;
        }
        .register-btn.back-btn {
            background: transparent;
            border: 1px solid rgba(139,92,246,0.35);
            color: #c4b5fd; box-shadow: none;
            flex: 0 0 auto;
            padding: 12px 18px;
        }
        .register-btn.back-btn:hover {
            background: rgba(139,92,246,0.12);
            border-color: #8b5cf6; color: #fff;
            box-shadow: none; transform: translateY(-1px);
        }

        /* Footer "¿ya tienes cuenta?" compacto */
        .sidebar-register-section { padding-top: 0 !important; }
        .login-footer-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 14px;
        }
        .login-footer-row p { margin: 0; color: #9ca3af; font-size: 13px; }
        .footer-login-link {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 8px 16px;
            font-size: 13px; font-weight: 600;
            border-radius: 8px;
            background: rgba(139,92,246,0.15);
            color: #c4b5fd;
            border: 1px solid rgba(139,92,246,0.3);
            text-decoration: none;
            transition: all 0.22s;
        }
        .footer-login-link:hover {
            background: rgba(139,92,246,0.28);
            color: #fff; border-color: #8b5cf6;
        }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .buttons-container { flex-direction: column; }
            .container { padding: 22px 18px 18px; }
        }
    </style>
</head>

<body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-N9LMPQBM"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->
    <div class="main-content">
        <div class="container">

            <div class="login-brand">
                <img src="/static/img/Icon.png" alt="Game Store">
                <span class="login-brand-name">Game Store</span>
            </div>
                    <h1>Crear una Cuenta</h1>
                    <p class="description">¡Vamos a crear tu cuenta!</p>

                    <form id="registro-form" class="form-section" method="post" action="/api/registro" novalidate>
                        <div class="form-grid">
                            <!-- Col 1: Usuario -->
                            <div class="form-col">
                                <label class="label" for="username"><i class="fa-solid fa-user" style="margin-right:5px;opacity:.7;"></i>Nombre de usuario</label>
                                <input type="text" id="username" name="username" class="input-field"
                                    placeholder="Mínimo 6 caracteres" minlength="6" aria-describedby="username-error">
                                <span class="error-message" id="username-error" aria-live="polite"></span>
                            </div>

                            <!-- Col 2: Email -->
                            <div class="form-col">
                                <label class="label" for="email"><i class="fa-solid fa-envelope" style="margin-right:5px;opacity:.7;"></i>Email</label>
                                <input type="email" id="email" name="email" class="input-field"
                                    placeholder="Ingresa tu correo electrónico" aria-describedby="email-error">
                                <span class="error-message" id="email-error" aria-live="polite"></span>
                            </div>

                            <!-- Col 1: Contraseña -->
                            <div class="form-col">
                                <label class="label" for="password"><i class="fa-solid fa-lock" style="margin-right:5px;opacity:.7;"></i>Contraseña</label>
                                <div class="password-field-wrapper">
                                    <input type="password" id="password" name="password" class="input-field"
                                        placeholder="Mínimo 8 caracteres" minlength="8" required aria-describedby="password-error">
                                    <button type="button" id="toggle-registro-password-btn" class="toggle-password-btn" aria-label="Mostrar contraseña" title="Mostrar contraseña">
                                        <i class="fa-solid fa-eye"></i>
                                    </button>
                                </div>
                                <span class="error-message" id="password-error" aria-live="polite"></span>
                            </div>

                            <!-- Col 2: Confirmar -->
                            <div class="form-col">
                                <label class="label" for="confirm-password"><i class="fa-solid fa-lock" style="margin-right:5px;opacity:.7;"></i>Confirmar contraseña</label>
                                <div class="password-field-wrapper">
                                    <input type="password" id="confirm-password" name="confirm_password" class="input-field"
                                        placeholder="Confirma tu contraseña" required aria-describedby="confirm-error">
                                    <button type="button" id="toggle-confirm-password-btn" class="toggle-password-btn" aria-label="Mostrar confirmación de contraseña" title="Mostrar confirmación de contraseña">
                                        <i class="fa-solid fa-eye"></i>
                                    </button>
                                </div>
                                <span class="error-message" id="confirm-error" aria-live="polite"></span>
                            </div>

                            <!-- Verificación: ocupa ambas columnas -->
                            <div class="form-col full-width verification-line">
                                <label class="label" for="recaptcha-widget"><i class="fa-solid fa-shield-halved" style="margin-right:5px;opacity:.7;"></i>Verificación</label>
                                <div class="captcha-block">
                                    {% if recaptcha_site_key %}
                                        <div id="recaptcha-widget" class="g-recaptcha" data-sitekey="{{ recaptcha_site_key }}" data-callback="onRecaptchaSuccess" data-expired-callback="onRecaptchaExpired"></div>
                                    {% else %}
                                        <div class="registro-alert is-error" style="display:block;">reCAPTCHA no está configurado.</div>
                                    {% endif %}
                                    <span class="error-message" id="recaptcha-error" aria-live="polite"></span>
                                </div>
                            </div>
                        </div>

                        <div id="registro-alert" class="registro-alert" aria-live="polite" style="display:none;"></div>

                        <div class="register-section">
                            <div class="buttons-container">
                                <button type="submit" class="register-btn" id="registro-btn">
                                    <i class="fa-solid fa-user-plus"></i> Crear Cuenta
                                </button>
                                <a href="/" class="register-btn back-btn">
                                    <i class="fa-solid fa-arrow-left"></i> Volver al Inicio
                                </a>
                            </div>
                        </div>
                    </form>

                    <div class="login-footer-row">
                        <p>¿Ya tienes cuenta?</p>
                        <a class="footer-login-link" href="/login">
                            <i class="fa-solid fa-right-to-bracket"></i> Iniciar Sesión
                        </a>
                    </div>
        </div>
    </div>

    <script src="/static/js/libs/jquery.min.js"></script>
    <script src="/static/js/libs/underscore.min.js"></script>
    <script src="/static/js/libs/backbone.min.js"></script>
    <script src="/static/js/menu-system.js?v=2.5"></script>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <script src="/static/js/registro.js?v=3.0"></script>


    <!-- Accesibilidad FAB -->
    <div id="accessibility-fab-container" style="position: fixed; bottom: 100px; right: 16px; z-index: 1300; display: flex; flex-direction: column; align-items: flex-end;">
        <div id="accessibility-menu" class="accessibility-menu" style="display:none; margin-bottom: 12px;">
            <h4>Accesibilidad</h4>
            <label for="font-size-range">Tamaño de texto</label>
            <input type="range" id="font-size-range" min="70" max="150" value="100">
            <span id="font-size-value">100%</span>
            <hr style="margin:1rem 0;border:0;border-top:1px solid #8b5cf6;">
            <button id="tts-toggle-btn" class="accessibility-menu-btn" aria-label="Lectura guiada" title="Lectura guiada">
                <i class="fa-solid fa-book-open"></i> Lectura guiada
            </button>
            <div id="tts-status" style="margin-top:0.5rem;color:#b19cd9;font-size:0.95em;display:none;"></div>
            <button id="voice-read-btn" class="accessibility-menu-btn" aria-label="Lectura de voz" title="Lectura de voz">
                <i class="fa-solid fa-volume-high"></i> Lectura de voz
            </button>
            <div id="voice-read-status" style="margin-top:0.5rem;color:#b19cd9;font-size:0.95em;display:none;"></div>
            <button id="grayscale-toggle-btn" class="accessibility-menu-btn" aria-label="Escala de grises" title="Escala de grises">
                <i class="fa-solid fa-adjust"></i> Escala de grises
            </button>
            <div id="grayscale-status" style="margin-top:0.5rem;color:#b19cd9;font-size:0.95em;display:none;"></div>
            <button id="keyboard-nav-toggle-btn" class="accessibility-menu-btn" aria-label="Navegación por teclado" title="Navegación por teclado">
                <i class="fa-solid fa-keyboard"></i> Navegación por teclado
            </button>
            <div id="keyboard-nav-status" style="margin-top:0.5rem;color:#b19cd9;font-size:0.95em;display:none;"></div>
        </div>
        <button id="accessibility-btn" aria-label="Accesibilidad" title="Accesibilidad">
            <i class="fa-solid fa-universal-access"></i>
        </button>
    </div>
    <script src="/static/js/script.js?v=2.4"></script>
</body>

</html>

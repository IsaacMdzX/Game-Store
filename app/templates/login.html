<!DOCTYPE html>
<html lang="es">

<head>

    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-N9LMPQBM');</script>
    <!-- End Google Tag Manager -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="description" content="Inicia sesión en Game Store">
    <meta name="theme-color" content="#58009A">
    <title>Iniciar Sesión - Game Store</title>
    <link rel="icon" type="image/x-icon" href="/static/img/Icon.png">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/responsive.css">
    <link rel="stylesheet" href="/static/css/mobile-aesthetic.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-N9LMPQBM"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->
    <!-- Contenido Principal -->
    <div class="main-content">
        <div class="container">
            <h1>Iniciar Sesión</h1>

            <p class="description">Ingresa el nombre o correo electrónico registrado.</p>

            <form id="login-form" class="form-section">
                <div class="form-line">
                      <label class="label" for="login-input">Nombre de usuario o Correo electrónico</label>
                    <input type="text" id="login-input" name="login_input" class="input-field"
                          placeholder="Ingresa tu usuario o correo" required aria-describedby="login-input-error">
                      <span class="error-message" id="login-input-error" aria-live="polite"></span>
                </div>

                <div class="form-line">
                      <label class="label" for="login-password">Contraseña</label>
                    <div class="password-field-wrapper">
                        <input type="password" id="login-password" name="password" class="input-field"
                              placeholder="Ingresa tu contraseña" required aria-describedby="password-error">
                        <button type="button" id="toggle-login-password-btn" class="toggle-password-btn" aria-label="Mostrar contraseña" title="Mostrar contraseña">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                      <span class="error-message" id="password-error" aria-live="polite"></span>
                </div>

                <div class="register-section">
                    <div class="buttons-container">
                        <button type="submit" class="register-btn" id="login-btn">
                            <i class="fa-solid fa-right-to-bracket"></i> Iniciar Sesión
                        </button>
                        <a href="/" class="register-btn back-btn">
                            <i class="fa-solid fa-arrow-left"></i> Volver al Inicio
                        </a>
                    </div>
                </div>
            </form>

            <div class="sidebar-register-section">
                <p class="preguntaxd">¿No tienes cuenta?</p>
                <a class="sidebar-register-btn" href="/registro">Crear cuenta</a>
            </div>
        </div>
    </div>

    <script src="/static/js/menu-system.js"></script>
    <script src="/static/js/login.js"></script>
</body>

</html>

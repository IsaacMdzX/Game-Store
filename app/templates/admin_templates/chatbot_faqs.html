<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQs Chatbot - Admin</title>
    <link rel="stylesheet" href="/static/css/stylee.css">
    <link rel="icon" type="image/x-icon" href="/static/img/Icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <nav class="barra_lateral">
        <a href="/admin"><img class="logo" src="/static/img/Icon_GS.png" alt="Logo"></a>
        <ul>
            <li><a class="enlace_barra_lateral" href="/admin"><i class="fa-solid fa-house"></i> Inicio</a></li>
            <li><a class="enlace_barra_lateral" href="/admin/pedidos"><i class="fa-solid fa-truck"></i> Gestión de pedidos</a></li>
            <li><a class="enlace_barra_lateral" href="/admin/inventario"><i class="fa-solid fa-boxes-packing"></i> Gestión de productos</a></li>
            <li><a class="enlace_barra_lateral" href="/admin/usuarios"><i class="fa-solid fa-users"></i> Gestión de usuarios</a></li>
            <li><a class="enlace_barra_lateral_fijo" href="/admin/chatbot-faqs"><i class="fa-solid fa-comments"></i> FAQs Chatbot</a></li>
        </ul>
    </nav>

    <main>
        <header class="encabezado">
            <section class="iconos">
                <div class="user-menu-container">
                    <button class="user-menu-btn" id="userMenuBtn">
                        <i class="fa-solid fa-circle-user"></i>
                        <i class="fa-solid fa-chevron-down"></i>
                    </button>
                    <div class="user-dropdown" id="userDropdown">
                        <div class="dropdown-content">
                            <div class="loading-menu">
                                <i class="fa-solid fa-spinner fa-spin"></i> Cargando...
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </header>

        <section class="principal">
            <div>
                <h1>FAQs del Chatbot</h1>
                <p style="color: #a0a0a0; font-size: 16px;">Preguntas frecuentes realizadas por clientes</p>
            </div>

            <div class="filtros-container" style="margin-bottom: 12px; display: flex; gap: 10px; flex-wrap: wrap; align-items: end;">
                <input type="text" id="faqSearch" class="search-input" placeholder="Buscar pregunta..." style="min-width: 220px;">

                <select id="faqIntent" class="filtro-select" style="min-width: 180px;">
                    <option value="">Todas las intenciones</option>
                </select>

                <select id="faqPage" class="filtro-select" style="min-width: 180px;">
                    <option value="">Todas las páginas</option>
                </select>

                <input type="date" id="faqDateFrom" class="filtro-select">
                <input type="date" id="faqDateTo" class="filtro-select">

                <button type="button" id="faqApplyFilters" class="btn-secondary">Filtrar</button>
                <button type="button" id="faqClearFilters" class="btn-secondary">Limpiar</button>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Pregunta</th>
                            <th>Frecuencia</th>
                            <th>Intención</th>
                            <th>Página</th>
                            <th>Última consulta</th>
                        </tr>
                    </thead>
                    <tbody id="chatbot-faq-body">
                        <tr>
                            <td colspan="5" class="no-data">Cargando preguntas frecuentes...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <script src="/static/js/menu-system.js"></script>
        <script src="/static/js/user-menu-loader.js"></script>
        <script src="/static/js/admin-chatbot-faqs.js"></script>
    </main>
</body>

</html>

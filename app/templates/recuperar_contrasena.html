<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="description" content="Recuperar contraseña en Game Store">
    <meta name="theme-color" content="#58009A">
    <title>Recuperar Contraseña - Game Store</title>
    <link rel="icon" type="image/x-icon" href="/static/img/Icon.png">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/responsive.css?v=2.2">
    <link rel="stylesheet" href="/static/css/mobile-aesthetic.css?v=2.2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>
    <div class="main-content">
        <div class="container">
            <h1>Recuperar Contraseña</h1>
            <p class="description">Ingresa tu correo, recibe un código y crea una nueva contraseña.</p>

            <form id="password-reset-form" class="form-section" novalidate>
                <div class="form-line">
                    <label class="label" for="reset-email">Email:</label>
                    <input type="email" id="reset-email" class="input-field" placeholder="Ingresa tu correo" aria-describedby="reset-email-error">
                    <span class="error-message" id="reset-email-error" aria-live="polite"></span>
                </div>

                <div class="form-line">
                    <label class="label" for="reset-code">Código de verificación:</label>
                    <input type="text" id="reset-code" class="input-field" placeholder="Código de 6 dígitos" aria-describedby="reset-code-error">
                    <span class="error-message" id="reset-code-error" aria-live="polite"></span>
                </div>

                <div class="form-line">
                    <label class="label" for="reset-password">Nueva contraseña:</label>
                    <div class="password-field-wrapper">
                        <input type="password" id="reset-password" class="input-field" placeholder="Mínimo 8 caracteres" aria-describedby="reset-password-error">
                        <button type="button" id="toggle-reset-password-btn" class="toggle-password-btn" aria-label="Mostrar contraseña" title="Mostrar contraseña">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                    <span class="error-message" id="reset-password-error" aria-live="polite"></span>
                </div>

                <div class="form-line">
                    <label class="label" for="reset-confirm-password">Confirmar contraseña:</label>
                    <div class="password-field-wrapper">
                        <input type="password" id="reset-confirm-password" class="input-field" placeholder="Confirma tu contraseña" aria-describedby="reset-confirm-password-error">
                        <button type="button" id="toggle-reset-confirm-password-btn" class="toggle-password-btn" aria-label="Mostrar contraseña" title="Mostrar contraseña">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                    <span class="error-message" id="reset-confirm-password-error" aria-live="polite"></span>
                </div>

                <div id="reset-alert" class="registro-alert" aria-live="polite" style="display:none;"></div>

                <div class="register-section">
                    <div class="buttons-container">
                        <button type="button" class="register-btn" id="send-reset-code-btn">
                            <i class="fa-solid fa-paper-plane"></i> Enviar código
                        </button>
                        <button type="submit" class="register-btn" id="confirm-reset-btn">
                            <i class="fa-solid fa-key"></i> Cambiar contraseña
                        </button>
                        <a href="/login" class="register-btn back-btn">
                            <i class="fa-solid fa-arrow-left"></i> Volver a Login
                        </a>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/js/menu-system.js?v=2.4"></script>
    <script src="/static/js/recuperar-contrasena.js"></script>
</body>

</html>
